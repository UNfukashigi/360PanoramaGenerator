<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Panorama Viewer — Drop & View</title>
    <meta name="description" content="パノラマ画像をドラッグ＆ドロップして、360度ビューアーで表示。単体HTMLとして保存も可能。">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --surface: rgba(15, 23, 42, 0.75);
            --border: rgba(255, 255, 255, 0.12);
            --accent: #38bdf8;
            --accent2: #818cf8;
            --success: #34d399;
            --danger: #f87171;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
        }

        /* ── Pannellum viewer ─────────────────────── */
        #viewer {
            position: fixed;
            inset: 0;
        }

        /* ── Drop Overlay ────────────────────────── */
        #drop-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, rgba(2, 6, 23, 0.92) 0%, rgba(2, 6, 23, 0.98) 100%);
            backdrop-filter: blur(8px);
            transition: opacity 0.5s ease;
        }

        #drop-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .drop-zone {
            width: min(520px, 90vw);
            padding: 60px 40px;
            border: 2px dashed var(--border);
            border-radius: 28px;
            text-align: center;
            background: var(--surface);
            backdrop-filter: blur(20px);
            transition: border-color 0.25s, background 0.25s, transform 0.25s;
            cursor: pointer;
        }

        .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.08);
            transform: scale(1.02);
        }

        .drop-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(129, 140, 248, 0.2));
            border: 1px solid rgba(56, 189, 248, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse-ring 3s ease-in-out infinite;
        }

        .drop-icon svg {
            width: 36px;
            height: 36px;
            fill: var(--accent);
        }

        @keyframes pulse-ring {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.3);
            }

            50% {
                box-shadow: 0 0 0 16px rgba(56, 189, 248, 0);
            }
        }

        .drop-title {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.04em;
            color: #fff;
            margin-bottom: 10px;
        }

        .drop-sub {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.7;
        }

        .drop-sub span {
            color: var(--accent);
            font-weight: 600;
        }

        .drop-sub small {
            font-size: 11px;
            opacity: 0.7;
            font-weight: 400;
            display: block;
            margin-top: 2px;
        }

        .or-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 12px;
        }

        .or-divider::before,
        .or-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .file-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
        }

        .file-btn:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }

        #file-input {
            display: none;
        }

        /* ── Drag-Over Full-Screen Hint ──────────────────── */
        #drag-hint {
            position: fixed;
            inset: 0;
            z-index: 300;
            border: 3px solid var(--accent);
            border-radius: 0;
            pointer-events: none;
            opacity: 0;
            background: rgba(56, 189, 248, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        #drag-hint.active {
            opacity: 1;
        }

        #drag-hint-text {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 0.06em;
            text-shadow: 0 0 32px rgba(56, 189, 248, 0.6);
        }

        /* ── UI Buttons (right side, vertical) ─────────────── */
        .btn-cluster {
            position: fixed;
            top: 50%;
            right: 20px;
            z-index: 100;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .icon-btn {
            width: 48px;
            height: 48px;
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                background 0.2s, border-color 0.2s;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
            position: relative;
        }

        .icon-btn:hover {
            transform: scale(1.12);
            background: var(--accent);
            border-color: #fff;
        }

        .icon-btn:hover svg {
            fill: #fff;
        }

        .icon-btn svg {
            fill: var(--text-muted);
            width: 22px;
            height: 22px;
            transition: fill 0.2s;
        }

        .icon-btn.save-btn:hover {
            background: var(--accent2);
        }

        /* tooltip — left side */
        .icon-btn::after {
            content: attr(data-tip);
            position: absolute;
            right: calc(100% + 12px);
            top: 50%;
            transform: translateY(-50%);
            background: rgba(10, 15, 30, 0.98);
            color: #fff;
            font-size: 11px;
            white-space: pre;
            text-align: right;
            line-height: 1.4;
            padding: 8px 14px;
            border-radius: 12px;
            pointer-events: none;
            opacity: 0;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .icon-btn:hover::after {
            opacity: 1;
            transform: translateY(-50%) translateX(-4px);
        }

        /* ── Info badge (bottom-left) ────────────────────────── */
        .info-badge {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 10;
            padding: 12px 18px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 14px;
            pointer-events: none;
        }

        .info-badge h1 {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.08em;
            color: var(--accent);
        }

        .info-badge p {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ── Toast ───────────────────────────────────────── */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            z-index: 500;
            transform: translateX(-50%) translateY(20px);
            padding: 12px 24px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #toast.success {
            border-color: var(--success);
            color: var(--success);
        }

        #toast.error {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* ── Meta pill (bottom-right) ────────────────────── */
        #meta-pill {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 10;
            padding: 8px 18px;
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 40px;
            font-size: 11px;
            color: var(--text-muted);
            font-family: monospace;
            transition: opacity 0.5s;
        }

        #meta-pill.hidden {
            opacity: 0;
        }
    </style>
</head>

<body>

    <!-- ░░ Drop overlay (initial screen) ░░ -->
    <div id="drop-overlay">
        <div class="drop-zone" id="drop-zone">
            <div class="drop-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />
                </svg>
            </div>
            <p class="drop-title">360 Panorama Generator</p>
            <p class="drop-sub">
                画像をドラッグアンドドロップまたはファイルを選択<br>
                <small>Drag & drop images or select a file</small><br>
                <span>Supports JPG / PNG / WEBP</span><br><br>
            </p>
            <label class="file-btn" for="file-input">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                </svg>
                ファイルを選択
            </label>
            <input type="file" id="file-input" accept="image/*">
        </div>
    </div>

    <!-- ░░ Full-screen drag hint ░░ -->
    <div id="drag-hint"><span id="drag-hint-text">ここにドロップ</span></div>

    <!-- ░░ Pannellum viewer ░░ -->
    <div id="viewer"></div>

    <!-- ░░ Info badge ░░ -->
    <div class="info-badge">
        <h1>360° PANORAMA</h1>
        <p id="file-name">— ファイル未選択 —</p>
    </div>

    <div class="btn-cluster">
        <!-- Screenshot -->
        <button class="icon-btn" id="screenshot-btn" data-tip="スクリーンショット&#10;Take Screenshot">
            <svg viewBox="0 0 24 24">
                <path
                    d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2m8 3a5 5 0 0 0-5 5 5 5 0 0 0 5 5 5 5 0 0 0 5-5 5 5 0 0 0-5-5m0 2a3 3 0 0 1 3 3 3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1 3-3z" />
            </svg>
        </button>
        <!-- Save HTML -->
        <button class="icon-btn save-btn" id="save-btn" data-tip="HTMLとして保存&#10;Save as HTML" disabled>
            <svg viewBox="0 0 24 24">
                <path
                    d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM12 17l-4-4h2.5v-3h3v3H16l-4 4z" />
            </svg>
        </button>
        <!-- Change image -->
        <label class="icon-btn" for="file-input" data-tip="画像を変更&#10;Change Image">
            <svg viewBox="0 0 24 24">
                <path
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 8 6.5 8 8 8.67 8 9.5 7.33 11 6.5 11zm3-4C8.67 7 8 6.33 8 5.5S8.67 4 9.5 4s1.5.67 1.5 1.5S10.33 7 9.5 7zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 4 14.5 4s1.5.67 1.5 1.5S15.33 7 14.5 7zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 8 17.5 8s1.5.67 1.5 1.5S18.33 11 17.5 11z" />
            </svg>
        </label>
    </div>

    <!-- ░░ Meta pill ░░ -->
    <div id="meta-pill" class="hidden">Pannellum 2.5.6</div>

    <!-- ░░ Toast ░░ -->
    <div id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <script>
        /* ─────────────────────────────────────────────
           WebGL Context Override for Screenshots
        ───────────────────────────────────────────── */
        const originalGetContext = HTMLCanvasElement.prototype.getContext;
        HTMLCanvasElement.prototype.getContext = function(type, options) {
            if (type === 'webgl' || type === 'experimental-webgl') {
                options = options || {};
                options.preserveDrawingBuffer = true;
            }
            return originalGetContext.call(this, type, options);
        };

        /* ─────────────────────────────────────────────
           State
        ───────────────────────────────────────────── */
        let viewer = null;
        let currentB64 = null;   // base64 data-URL of current image
        let currentMime = 'image/jpeg';
        let currentFileName = 'panorama';

        /* ─────────────────────────────────────────────
           Elements
        ───────────────────────────────────────────── */
        const dropOverlay = document.getElementById('drop-overlay');
        const dropZone = document.getElementById('drop-zone');
        const dragHint = document.getElementById('drag-hint');
        const fileInput = document.getElementById('file-input');
        const screenshotBtn = document.getElementById('screenshot-btn');
        const saveBtn = document.getElementById('save-btn');
        const fileNameEl = document.getElementById('file-name');
        const metaPill = document.getElementById('meta-pill');
        const toastEl = document.getElementById('toast');

        /* ─────────────────────────────────────────────
           Toast helper
        ───────────────────────────────────────────── */
        let toastTimer;
        function showToast(msg, type = '') {
            clearTimeout(toastTimer);
            toastEl.textContent = msg;
            toastEl.className = 'show ' + type;
            toastTimer = setTimeout(() => { toastEl.className = ''; }, 3000);
        }

        /* ─────────────────────────────────────────────
           File processing
        ───────────────────────────────────────────── */
        function processFile(file) {
            if (!file || !file.type.startsWith('image/')) {
                showToast('画像ファイルを選択してください', 'error');
                return;
            }

            currentMime = file.type || 'image/jpeg';
            currentFileName = file.name.replace(/\.[^.]+$/, '') || 'panorama';

            const reader = new FileReader();
            reader.onload = (e) => {
                currentB64 = e.target.result; // full data-URL
                loadPanorama(currentB64, file.name);
            };
            reader.readAsDataURL(file);
        }

        function loadPanorama(dataUrl, label) {
            // Hide drop overlay
            dropOverlay.classList.add('hidden');
            metaPill.classList.remove('hidden');
            fileNameEl.textContent = label || currentFileName;
            saveBtn.disabled = false;

            if (viewer) {
                // Update existing viewer
                viewer.loadScene('main');
                viewer.destroy();
                viewer = null;
            }

            viewer = pannellum.viewer('viewer', {
                type: 'equirectangular',
                panorama: dataUrl,
                autoLoad: true,
                showControls: true,
                mouseZoom: true,
                hfov: 120,        // 最大引き（最小ズーム）で初期化
                minHfov: 30,
                maxHfov: 120,
                compass: false,
                strings: { loadButtonLabel: '読み込む', loadingLabel: '読み込み中…', bylineLabel: '' }
            });

            showToast('✓ パノラマを読み込みました', 'success');
        }

        /* ─────────────────────────────────────────────
           Drag & Drop — Full overlay (initial screen)
        ───────────────────────────────────────────── */
        ['dragenter', 'dragover'].forEach(ev => {
            dropOverlay.addEventListener(ev, e => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
        });
        ['dragleave', 'drop'].forEach(ev => {
            dropOverlay.addEventListener(ev, () => dropZone.classList.remove('dragover'));
        });
        dropOverlay.addEventListener('drop', e => {
            e.preventDefault();
            processFile(e.dataTransfer.files[0]);
        });

        /* ─────────────────────────────────────────────
           Drag & Drop — Full window (when viewer active)
        ───────────────────────────────────────────── */
        let dragCounter = 0;
        document.addEventListener('dragenter', e => {
            e.preventDefault();
            dragCounter++;
            if (!dropOverlay.classList.contains('hidden')) return; // already showing overlay
            dragHint.classList.add('active');
        });
        document.addEventListener('dragleave', () => {
            dragCounter--;
            if (dragCounter <= 0) { dragCounter = 0; dragHint.classList.remove('active'); }
        });
        document.addEventListener('dragover', e => e.preventDefault());
        document.addEventListener('drop', e => {
            e.preventDefault();
            dragCounter = 0;
            dragHint.classList.remove('active');
            if (!dropOverlay.classList.contains('hidden')) return; // handled by dropZone
            processFile(e.dataTransfer.files[0]);
        });

        /* ─────────────────────────────────────────────
           File input
        ───────────────────────────────────────────── */
        fileInput.addEventListener('change', () => {
            if (fileInput.files[0]) processFile(fileInput.files[0]);
            fileInput.value = '';
        });

        /* ─────────────────────────────────────────────
           Screenshot
        ───────────────────────────────────────────── */
        screenshotBtn.addEventListener('click', () => {
            if (!viewer) { showToast('パノラマを先に読み込んでください', 'error'); return; }
            try {
                const canvas = document.querySelector('#viewer canvas');
                if (!canvas) throw new Error('canvas not found');
                const a = document.createElement('a');
                a.download = `${currentFileName}_screenshot.jpg`;
                a.href = canvas.toDataURL('image/jpeg', 0.95);
                a.click();
                showToast('✓ スクリーンショットを保存しました', 'success');
            } catch {
                showToast('スクリーンショットの取得に失敗しました', 'error');
            }
        });

        /* ─────────────────────────────────────────────
           Save as standalone HTML
        ───────────────────────────────────────────── */
        saveBtn.addEventListener('click', () => {
            if (!currentB64) { showToast('パノラマを先に読み込んでください', 'error'); return; }
            showToast('HTMLを生成中…');

            // Get current viewer state
            let yaw = 0, pitch = 0, hfov = 100;
            if (viewer) {
                try { yaw = viewer.getYaw(); } catch { }
                try { pitch = viewer.getPitch(); } catch { }
                try { hfov = viewer.getHfov(); } catch { }
            }

            const html = buildStandaloneHTML(currentB64, currentFileName, yaw, pitch, hfov);
            const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            const a = document.createElement('a');
            a.download = `${currentFileName}_panorama.html`;
            a.href = URL.createObjectURL(blob);
            a.click();
            setTimeout(() => URL.revokeObjectURL(a.href), 5000);
            showToast('✓ HTMLファイルを保存しました', 'success');
        });

        /* ─────────────────────────────────────────────
           Build standalone HTML template
        ───────────────────────────────────────────── */
        function buildStandaloneHTML(dataUrl, name, yaw, pitch, hfov) {
            return `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>360° ${name}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
<style>
:root{--bg:#020617;--glass:rgba(15,23,42,0.75);--border:rgba(255,255,255,0.15);--accent:#38bdf8}
body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:system-ui,sans-serif}
#viewer{position:fixed;inset:0}
.overlay{position:fixed;bottom:24px;left:24px;z-index:10;padding:14px 20px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:14px;color:#fff;pointer-events:none}
.overlay h1{margin:0;font-size:14px;font-weight:800;letter-spacing:.08em;color:var(--accent)}
.overlay p{margin:2px 0 0;font-size:11px;color:#94a3b8}
.btn-wrap{position:fixed;top:50%;right:20px;transform:translateY(-50%);z-index:100}
.btn{width:48px;height:48px;background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,0.35);transition:transform .2s,background .2s}
.btn:hover{transform:scale(1.1);background:var(--accent)}
.btn svg{fill:#94a3b8;width:22px;height:22px;transition:fill .2s}
.btn:hover svg{fill:#fff}
</style>
</head>
<body>
<div id="viewer"></div>
<div class="overlay"><h1>360° PANORAMA</h1><p>${name}</p></div>
<div class="btn-wrap">
  <button class="btn" id="screenshot" title="Screenshot">
    <svg viewBox="0 0 24 24"><path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2m8 3a5 5 0 0 0-5 5 5 5 0 0 0 5 5 5 5 0 0 0 5-5 5 5 0 0 0-5-5m0 2a3 3 0 0 1 3 3 3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1 3-3z"/></svg>
  </button>
</div>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"><\/script>
<script>
const originalGetContext = HTMLCanvasElement.prototype.getContext;
HTMLCanvasElement.prototype.getContext = function(type, options) {
  if (type === 'webgl' || type === 'experimental-webgl') {
    options = options || {};
    options.preserveDrawingBuffer = true;
  }
  return originalGetContext.call(this, type, options);
};

const viewer = pannellum.viewer('viewer',{
  type:'equirectangular',
  panorama:'${dataUrl}',
  autoLoad:true,
  yaw:${Math.round(yaw)},
  pitch:${Math.round(pitch)},
  hfov:${Math.round(hfov)},
  showControls:true,
  mouseZoom:true,
  compass:false
